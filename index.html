<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Oréal | Smart Routine &amp; Product Advisor</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <!------- Header / Branding ------->
      <header class="site-header">
        <img src="img/loreal-logo.png" alt="L'Oréal Logo" class="logo" />
        <h1 class="site-title">Smart Routine &amp; Product Advisor</h1>
      </header>

      <!-- Category Filter -->
      <div class="search-section">
        <label class="visually-hidden" for="productSearch">
          Search products by name or keyword
        </label>
        <input
          id="productSearch"
          type="search"
          placeholder="Search products by name or keyword"
          autocomplete="off"
        />
        <label class="visually-hidden" for="categoryFilter">
          Filter products by category
        </label>
        <select id="categoryFilter">
          <option value="" selected>All Categories</option>
          <option value="cleanser">Cleansers</option>
          <option value="moisturizer">Moisturizers & Treatments</option>
          <option value="haircare">Haircare</option>
          <option value="makeup">Makeup</option>
          <option value="hair color">Hair Color</option>
          <option value="hair styling">Hair Styling</option>
          <option value="men's grooming">Men's Grooming</option>
          <option value="suncare">Suncare</option>
          <option value="fragrance">Fragrance</option>
        </select>
      </div>

      <!-- Products Grid -->
      <div id="productsContainer" class="products-grid"></div>

      <!-- Product Details Modal -->
      <div id="productModal" class="product-modal" aria-hidden="true">
        <div class="product-modal__backdrop" data-modal-close></div>
        <div
          class="product-modal__dialog"
          role="dialog"
          aria-modal="true"
          aria-labelledby="productModalTitle"
        >
          <button
            type="button"
            id="closeProductModal"
            class="product-modal__close"
            aria-label="Close product details"
          >
            &times;
          </button>
          <img id="productModalImage" class="product-modal__image" alt="" />
          <h2 id="productModalTitle"></h2>
          <p id="productModalBrand" class="product-modal__brand"></p>
          <p
            id="productModalDescription"
            class="product-modal__description"
          ></p>
        </div>
      </div>

      <!-- Selected Products -->
      <div class="selected-products">
        <div class="selected-products-header">
          <h2>Selected Products</h2>
          <button id="clearSelections" class="clear-btn" type="button">
            Clear All
          </button>
        </div>
        <div id="selectedProductsList"></div>
        <button id="generateRoutine" class="generate-btn">
          <i class="fa-solid fa-wand-magic-sparkles"></i> Generate Routine
        </button>
      </div>

      <!------- Chat Area ------->
      <section class="chatbox">
        <h2>Let's Build Your Routine</h2>
        <div id="chatWindow" class="chat-window"></div>

        <form id="chatForm" class="chat-form">
          <label for="userInput" class="visually-hidden">Message</label>
          <input
            id="userInput"
            name="userInput"
            type="text"
            placeholder="Ask me about products or routines…"
            autocomplete="off"
            required
          />
          <button type="submit" id="sendBtn">
            <i class="fa-solid fa-paper-plane"></i>
            <span class="visually-hidden">Send</span>
          </button>
        </form>
      </section>

      <!------- Footer Links ------->
      <footer class="site-footer">
        <p>&copy; 2025 L'Oréal. All rights reserved.</p>
        <nav>
          <!-- These URLs are placeholders -->
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Use</a>
          <a href="#">Contact</a>
        </nav>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
